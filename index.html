<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #21262d; --border2: #30363d;
      --text: #c9d1d9; --dim: #8b949e; --muted: #6e7681; --bright: #e6edf3;
      --mono: 'Courier New', monospace; --serif: Georgia, serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--serif); min-height: 100vh; }

    header {
      position: sticky; top: 0; z-index: 10; background: var(--bg);
      border-bottom: 1px solid var(--border); padding: 24px 40px 18px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .header-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 4px; }
    h1 { font-size: 26px; font-weight: 400; color: var(--bright); letter-spacing: -.02em; }
    #btn-add {
      background: #238636; color: #fff; border: 1px solid #2ea043;
      border-radius: 6px; padding: 8px 18px; font-size: 13px; cursor: pointer;
      font-family: var(--mono); letter-spacing: .05em; transition: all .15s;
    }
    #btn-add.cancel { background: var(--surface); color: var(--dim); border-color: var(--border2); }

    #stats-bar { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }
    .stat-btn {
      flex: 1; min-width: 90px; background: transparent; border: none;
      border-bottom: 2px solid transparent; padding: 14px 10px 12px;
      cursor: pointer; transition: all .15s; text-align: center;
    }
    .stat-btn.active { border-bottom-color: var(--scolor); background: var(--sbg); }
    .stat-num { font-size: 22px; font-weight: 700; font-family: var(--mono); color: var(--bright); }
    .stat-btn.active .stat-num { color: var(--scolor); }
    .stat-label { font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }
    .stat-btn.active .stat-label { color: var(--scolor); }

    main { padding: 24px 40px; }

    #form-wrap {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 8px; padding: 24px; margin-bottom: 28px;
      animation: fadeIn .2s ease; display: none;
    }
    #form-wrap.open { display: block; }
    .form-title { font-family: var(--mono); font-size: 15px; color: var(--bright); letter-spacing: .05em; margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
    input, select, textarea {
      background: var(--bg); border: 1px solid var(--border2); border-radius: 6px;
      padding: 8px 12px; color: var(--text); font-size: 14px; font-family: var(--serif);
      outline: none; width: 100%; transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: #58a6ff; }
    textarea { resize: vertical; }
    select option { background: var(--surface); }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(.5); }
    .form-actions { display: flex; justify-content: flex-end; margin-top: 18px; }
    #btn-save {
      background: #238636; color: #fff; border: 1px solid #2ea043;
      border-radius: 6px; padding: 8px 22px; font-size: 13px; cursor: pointer;
      font-family: var(--mono); transition: opacity .15s;
    }
    #btn-save:disabled { opacity: .4; cursor: default; }

    #controls { display: flex; gap: 12px; margin-bottom: 20px; }
    #search {
      flex: 1; background: var(--surface); border: 1px solid var(--border2);
      border-radius: 6px; padding: 8px 14px; color: var(--text);
      font-size: 14px; font-family: var(--serif); outline: none;
    }
    #search:focus { border-color: #58a6ff; }
    #sort-select {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 6px; padding: 8px 12px; color: var(--dim);
      font-size: 13px; font-family: var(--mono); outline: none;
    }

    #app-list { display: flex; flex-direction: column; gap: 8px; }
    .app-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px 20px;
      display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center;
      transition: border-color .15s;
    }
    .app-row:hover { border-color: var(--border2); }
    .app-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .app-company { font-size: 16px; font-weight: 600; color: var(--bright); }
    .app-dot { color: #484f58; }
    .app-role { font-size: 14px; color: var(--dim); font-style: italic; }
    .app-link { color: #58a6ff; font-size: 11px; font-family: var(--mono); text-decoration: none; }
    .app-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .badge {
      border-radius: 4px; padding: 2px 10px; font-size: 11px;
      font-family: var(--mono); letter-spacing: .08em; text-transform: uppercase;
      font-weight: 700; white-space: nowrap; border: 1px solid transparent;
    }
    .app-date { font-size: 11px; color: #484f58; font-family: var(--mono); }
    .app-notes { font-size: 12px; color: var(--muted); font-style: italic; }
    .row-actions { display: flex; gap: 6px; align-items: center; }
    .row-status {
      background: var(--bg); border: 1px solid var(--border2); border-radius: 4px;
      padding: 4px 8px; color: var(--dim); font-size: 11px; font-family: var(--mono);
      outline: none; cursor: pointer;
    }
    .btn-edit, .btn-del, .btn-confirm, .btn-cancel-del {
      border-radius: 4px; padding: 4px 10px; font-size: 12px;
      cursor: pointer; font-family: var(--mono); border: 1px solid var(--border2);
    }
    .btn-edit { background: transparent; color: var(--dim); }
    .btn-del  { background: transparent; color: var(--muted); }
    .btn-confirm { background: #3d1f1f; border-color: #8b0000; color: #f85149; }
    .btn-cancel-del { background: transparent; color: var(--muted); }

    #empty { text-align: center; padding: 60px 0; color: #484f58; display: none; }
    #empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
    #empty p { font-family: var(--mono); font-size: 13px; letter-spacing: .08em; }
    #footer { margin-top: 24px; text-align: center; font-size: 11px; color: #2d333b; font-family: var(--mono); letter-spacing: .08em; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 640px) {
      header { padding: 16px; }
      main { padding: 16px; }
      .form-grid { grid-template-columns: 1fr; }
      .app-row { grid-template-columns: 1fr; }
      .row-actions { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="header-sub" id="header-date"></div>
    <h1>Job Search</h1>
  </div>
  <button id="btn-add">+ Add Application</button>
</header>

<div id="stats-bar"></div>

<main>
  <div id="form-wrap">
    <div class="form-title" id="form-title">// new application</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Company *</label>
        <input id="f-company" type="text" placeholder="Acme Corp" />
      </div>
      <div class="form-group">
        <label>Role *</label>
        <input id="f-role" type="text" placeholder="Software Engineer" />
      </div>
      <div class="form-group">
        <label>Job Posting Link</label>
        <input id="f-link" type="text" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label>Date Applied</label>
        <input id="f-date" type="date" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status"></select>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="f-notes" rows="3" placeholder="Recruiter name, next steps, impressions..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button id="btn-save" disabled>Add Application</button>
    </div>
  </div>

  <div id="controls">
    <input id="search" type="text" placeholder="Search company or role..." />
    <select id="sort-select">
      <option value="date_desc">Newest First</option>
      <option value="date_asc">Oldest First</option>
      <option value="company">A–Z Company</option>
    </select>
  </div>

  <div id="app-list"></div>
  <div id="empty">
    <div class="empty-icon">◌</div>
    <p id="empty-msg">No applications yet. Add your first one.</p>
  </div>
  <div id="footer"></div>
</main>

<script>
  const STATUSES = [
    { id: "applied",         label: "Applied",                   color: "#6C8EBF", bg: "#1a2535" },
    { id: "interviewed",     label: "Interviewed",               color: "#B8A04A", bg: "#252012" },
    { id: "rejected_after",  label: "Rejected After Interview",  color: "#BF6C6C", bg: "#251a1a" },
    { id: "rejected_before", label: "Rejected Before Interview", color: "#8C5C5C", bg: "#1e1515" },
    { id: "offer",           label: "Offer",                     color: "#6CBF8E", bg: "#152518" },
    { id: "accepted",        label: "Accepted",                  color: "#4ABBA8", bg: "#122220" },
  ];
  const byId = Object.fromEntries(STATUSES.map(s => [s.id, s]));

  let apps = [];
  let editId = null;
  let filterStatus = "all";
  let deleteConfirm = null;

  function loadApps() {
    try { apps = JSON.parse(localStorage.getItem("job_apps") || "[]"); } catch { apps = []; }
  }
  function saveApps() {
    localStorage.setItem("job_apps", JSON.stringify(apps));
  }

  // Header date
  document.getElementById("header-date").textContent =
    new Date().toLocaleDateString("en-US", { year: "numeric", month: "long" });

  // Populate form status select
  const fStatus = document.getElementById("f-status");
  STATUSES.forEach(s => {
    const o = document.createElement("option");
    o.value = s.id; o.textContent = s.label;
    fStatus.appendChild(o);
  });

  // Build stats bar
  const statsBar = document.getElementById("stats-bar");
  STATUSES.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "stat-btn";
    btn.id = "stat-" + s.id;
    btn.style.setProperty("--scolor", s.color);
    btn.style.setProperty("--sbg", s.bg);
    btn.innerHTML = `<div class="stat-num" id="count-${s.id}">0</div><div class="stat-label">${s.label}</div>`;
    btn.addEventListener("click", () => {
      filterStatus = filterStatus === s.id ? "all" : s.id;
      render();
    });
    statsBar.appendChild(btn);
  });

  // Form
  const formWrap  = document.getElementById("form-wrap");
  const btnAdd    = document.getElementById("btn-add");
  const btnSave   = document.getElementById("btn-save");
  const fCompany  = document.getElementById("f-company");
  const fRole     = document.getElementById("f-role");
  const fLink     = document.getElementById("f-link");
  const fDate     = document.getElementById("f-date");
  const fNotes    = document.getElementById("f-notes");

  fDate.value = new Date().toISOString().split("T")[0];

  function validateForm() {
    btnSave.disabled = !(fCompany.value.trim() && fRole.value.trim());
  }
  fCompany.addEventListener("input", validateForm);
  fRole.addEventListener("input", validateForm);

  btnAdd.addEventListener("click", () => {
    formWrap.classList.contains("open") ? closeForm() : openForm(null);
  });

  function openForm(app) {
    editId = app ? app.id : null;
    document.getElementById("form-title").textContent = editId ? "// edit application" : "// new application";
    btnSave.textContent = editId ? "Save Changes" : "Add Application";
    fCompany.value = app ? app.company : "";
    fRole.value    = app ? app.role    : "";
    fLink.value    = app ? (app.link  || "") : "";
    fDate.value    = app ? app.date    : new Date().toISOString().split("T")[0];
    fStatus.value  = app ? app.status  : "applied";
    fNotes.value   = app ? (app.notes || "") : "";
    validateForm();
    formWrap.classList.add("open");
    btnAdd.textContent = "✕ Cancel";
    btnAdd.classList.add("cancel");
    fCompany.focus();
  }

  function closeForm() {
    formWrap.classList.remove("open");
    btnAdd.textContent = "+ Add Application";
    btnAdd.classList.remove("cancel");
    editId = null;
  }

  btnSave.addEventListener("click", () => {
    if (!fCompany.value.trim() || !fRole.value.trim()) return;
    const entry = {
      id:      editId || Date.now(),
      company: fCompany.value.trim(),
      role:    fRole.value.trim(),
      link:    fLink.value.trim(),
      date:    fDate.value,
      status:  fStatus.value,
      notes:   fNotes.value.trim(),
    };
    apps = editId ? apps.map(a => a.id === editId ? entry : a) : [...apps, entry];
    saveApps();
    closeForm();
    render();
  });

  document.getElementById("search").addEventListener("input", render);
  document.getElementById("sort-select").addEventListener("change", render);

  function esc(str) {
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function render() {
    const search = document.getElementById("search").value.toLowerCase();
    const sortBy = document.getElementById("sort-select").value;

    STATUSES.forEach(s => {
      document.getElementById("count-" + s.id).textContent = apps.filter(a => a.status === s.id).length;
      document.getElementById("stat-"  + s.id).classList.toggle("active", filterStatus === s.id);
    });

    let filtered = apps
      .filter(a => filterStatus === "all" || a.status === filterStatus)
      .filter(a => !search || a.company.toLowerCase().includes(search) || a.role.toLowerCase().includes(search));

    filtered.sort((a, b) => {
      if (sortBy === "date_desc") return b.date.localeCompare(a.date);
      if (sortBy === "date_asc")  return a.date.localeCompare(b.date);
      if (sortBy === "company")   return a.company.localeCompare(b.company);
      return 0;
    });

    const list  = document.getElementById("app-list");
    const empty = document.getElementById("empty");

    if (filtered.length === 0) {
      list.innerHTML = "";
      empty.style.display = "block";
      document.getElementById("empty-msg").textContent =
        apps.length === 0 ? "No applications yet. Add your first one." : "No matches found.";
    } else {
      empty.style.display = "none";
      list.innerHTML = filtered.map(app => {
        const s = byId[app.status];
        const notes = app.notes
          ? "— " + esc(app.notes.length > 60 ? app.notes.slice(0, 60) + "…" : app.notes)
          : "";
        const linkHtml = app.link
          ? `<a class="app-link" href="${esc(app.link)}" target="_blank" rel="noopener">↗</a>`
          : "";
        const statusOpts = STATUSES.map(st =>
          `<option value="${st.id}"${st.id === app.status ? " selected" : ""}>${st.label}</option>`
        ).join("");
        const delBtns = deleteConfirm === app.id
          ? `<button class="btn-confirm" onclick="confirmDelete(${app.id})">confirm</button>
             <button class="btn-cancel-del" onclick="cancelDelete()">✕</button>`
          : `<button class="btn-del" onclick="askDelete(${app.id})">✕</button>`;
        return `
          <div class="app-row">
            <div>
              <div class="app-top">
                <span class="app-company">${esc(app.company)}</span>
                <span class="app-dot">·</span>
                <span class="app-role">${esc(app.role)}</span>
                ${linkHtml}
              </div>
              <div class="app-meta">
                <span class="badge" style="color:${s.color};background:${s.bg};border-color:${s.color}44">${s.label}</span>
                <span class="app-date">${esc(app.date)}</span>
                ${notes ? `<span class="app-notes">${notes}</span>` : ""}
              </div>
            </div>
            <div>
              <select class="row-status" onchange="quickStatus(${app.id}, this.value)">${statusOpts}</select>
            </div>
            <div class="row-actions">
              <button class="btn-edit" onclick="editApp(${app.id})">edit</button>
              ${delBtns}
            </div>
          </div>`;
      }).join("");
    }

    document.getElementById("footer").textContent =
      `${apps.length} total · data saved to browser`;
  }

  // Exposed handlers
  function quickStatus(id, status) {
    apps = apps.map(a => a.id === id ? {...a, status} : a);
    saveApps(); render();
  }
  function editApp(id) {
    const app = apps.find(a => a.id === id);
    if (app) openForm(app);
  }
  function askDelete(id)    { deleteConfirm = id;   render(); }
  function cancelDelete()   { deleteConfirm = null; render(); }
  function confirmDelete(id) {
    apps = apps.filter(a => a.id !== id);
    deleteConfirm = null;
    saveApps(); render();
  }

  window.quickStatus   = quickStatus;
  window.editApp       = editApp;
  window.askDelete     = askDelete;
  window.cancelDelete  = cancelDelete;
  window.confirmDelete = confirmDelete;

  loadApps();
  render();
</script>
</body>
</html>
